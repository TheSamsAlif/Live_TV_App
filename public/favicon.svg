<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb">
        <animate attributeName="stop-color" values="#2563eb;#7c3aed;#db2777;#2563eb" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#db2777">
        <animate attributeName="stop-color" values="#db2777;#2563eb;#7c3aed;#db2777" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bg)"/>

  <!-- rotating accent ring -->
  <g transform="translate(32 32)">
    <circle r="26" fill="none" stroke="url(#ring)" stroke-width="2.5" stroke-linecap="round"
            stroke-dasharray="40 120" opacity="0.85">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- TV screen -->
  <g transform="translate(32 33)">
    <rect x="-15" y="-9" width="30" height="20" rx="4" fill="#ffffff"/>
    <polygon points="-4,-1 -4,5 4,2" fill="#2563eb">
      <animate attributeName="fill" values="#2563eb;#7c3aed;#db2777;#2563eb" dur="6s" repeatCount="indefinite"/>
    </polygon>
    <!-- antenna -->
    <line x1="-6" y1="-9" x2="-11" y2="-17" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-9" x2="11" y2="-17" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- pulsing live dot -->
  <circle cx="49" cy="15" r="5" fill="#22c55e" stroke="#ffffff" stroke-width="2">
    <animate attributeName="r" values="4;5.5;4" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
</svg>
